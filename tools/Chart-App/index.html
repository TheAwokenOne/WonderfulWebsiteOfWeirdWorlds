<!DOCTYPE html>
<html>
<head>
    <title>Chart Generator</title>

    <link rel="stylesheet" href="../../common/styles.css">
    <script src="../../common/nav.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Excel parser -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        .top-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .chart-container {
            width: 100%;
            height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;

            background: var(--color-chart-bg);
            border: 1px solid var(--color-chart-border);
            border-radius: 8px;
        }
        .chart-container canvas {
            padding: 10px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        #chartTitle {
            font-weight: 600;
            text-align: center;
            flex: 1;
            color: var(--color-secondary);
        }

        .file-button {
            display: inline-block;
            padding: 10px 16px;
            background: var(--color-primary);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-button:hover {
            background: var(--color-primary-dark);
            box-shadow: 0 0 8px rgba(225, 29, 138, 0.5);
        }
    </style>
</head>

<body>

<!-- <script>
    loadNav();
</script> -->

<div class="container">

    <h2 class="highlight-secondary">Chart Generator</h2>

    <!-- FILE SELECT -->
    <div class="card top-bar">
        <label for="fileInput" class="file-button">
            Select Excel Files
        </label>
        <input type="file" id="fileInput" multiple hidden>
    </div>

    <!-- CHART -->
    <div class="card">

        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>

        <!-- CONTROLS -->
        <div class="controls">

            <!-- LEFT -->
            <div class="button-group">
                <button onclick="prevChart()">◀ Previous</button>
                <button onclick="nextChart()">Next ▶</button>
            </div>

            <!-- TITLE -->
            <div id="chartTitle">No chart loaded</div>

            <!-- RIGHT -->
            <div class="button-group">
                <button onclick="downloadCurrentChart()">Download</button>
                <button onclick="downloadAllCharts()">Download All</button>
                <button id="masterToggleBtn" onclick="toggleMasterView()">Show Master Chart</button>
                <button onclick="backToCharts()">Back</button>
            </div>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
``
