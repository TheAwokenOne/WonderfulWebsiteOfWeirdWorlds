<!DOCTYPE html>
<html>
<head>
    <title>Feature Search</title>

    <link rel="stylesheet" href="../../common/styles.css">

    <style>
        body {
            font-family: "Segoe UI", Roboto, sans-serif;
        }

        .container {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .left {
            flex: 1;
            min-width: 350px;
        }

        .right {
            width: 360px;
        }

        .feature-list {
            border: 1px solid #ccc;
            border-radius: 6px;
            max-height: 420px;
            overflow-y: auto;
            background: white;
        }

        .feature-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .feature-item:hover {
            background: #f2f6fb;
        }

        .feature-item:last-child {
            border-bottom: none;
        }

        .section {
            margin-bottom: 16px;
        }

        /* ===== RESULT CARD ===== */
        .result-card {
            display: flex;
            justify-content: space-between;
            align-items: center;

            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: 10px;

            padding: 16px 18px;
            margin-top: 10px;

            transition: all 0.2s ease;
        }

        .result-card:hover {
            border-color: var(--color-secondary);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.25);
            transform: translateY(-1px);
        }

        /* ===== LEFT ===== */
        .result-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .feature-code {
            font-size: 13px;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .feature-desc {
            font-size: 17px;
            font-weight: 600;
            color: var(--color-text-main);
        }

        .result-meta {
            font-size: 12.5px;
            color: var(--color-text-muted);
        }

        /* ===== RIGHT (PERCENT BOX) ===== */
        .result-right {
            min-width: 120px;

            background: linear-gradient(
                135deg,
                var(--color-primary),
                var(--color-primary-dark)
            );

            border-radius: 12px;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            padding: 12px 10px;

            /* ✅ subtle glow that matches your theme */
            box-shadow: 0 0 10px rgba(225, 29, 138, 0.35);
        }

        /* ===== BIG % ===== */
        .percent-value {
            font-size: 34px;
            font-weight: 700;
            color: var(--color-tertiary);  /* ✅ your yellow */
            line-height: 1;
        }

        /* ===== LABEL ===== */
        .percent-label {
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            margin-top: 2px;
        }

    </style>
</head>

<body>

<!-- NAV -->
<script src="../../common/nav.js"></script>
<!-- <script>loadNav();</script> -->

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left">

        <h2>Feature Search Tool</h2>

        <!-- LOAD DATABASE -->
        <div class="card section">
            <label>Password:</label><br><br>
            <input type="password" id="password">
            <button onclick="loadData()">Load Database</button>

            <div id="status" style="margin-top:10px;"></div>
        </div>

        <!-- INPUT + OPTIONS -->
        <div class="card section">
            <label><b>Enter Feature Code(s)</b> (comma separated):</label><br><br>
            <input type="text" id="featureInput" style="width:100%;">

            <br><br>

            <label>
                <input type="checkbox" id="singlesOnly">
                Compare individually (no combos)
            </label>

            <br><br>

            <button onclick="runSearch()">Run Analysis</button>
        </div>

        <!-- RESULTS -->
        <div class="card section">
            <div id="results">Results will appear here...</div>
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right">

        <div class="card">
            <label><b>Feature List</b></label><br><br>

            <input
                type="text"
                id="featureListSearch"
                placeholder="Search features..."
                style="width:95%; margin-bottom:10px;"
                oninput="filterFeatureList()"
            >

            <div id="featureList" class="feature-list"></div>
        </div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="decrypt.js"></script>
<script src="app.js"></script>
</body>
</html>
