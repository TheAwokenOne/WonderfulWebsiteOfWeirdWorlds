<!DOCTYPE html>
<html>
<head>
    <title>Feature Search</title>

    <link rel="stylesheet" href="../../common/styles.css">
</head>

<body>

<!-- NAV -->
<script src="../../common/nav.js"></script>
<script>loadNav();</script>

<h2>Feature Search Tool</h2>
<style>
    .container { display:flex; gap:24px; align-items:flex-start; }
    .left { flex:1; min-width:300px; }
    .right { width:340px; }
    .feature-list { border:1px solid #ccc; max-height:420px; overflow:auto; padding:4px; }
    .feature-item { padding:6px; border-bottom:1px solid #eee; cursor:pointer; }
    .feature-item:hover { background:#f6f6f6; }
</style>

<div class="container">
    <div class="left">

        <!-- PASSWORD LOAD -->
        <div>
            <label>Password:</label>
            <input type="password" id="password">
            <button onclick="loadData()">Load Database</button>
        </div>

        <br>

        <!-- INPUT -->
        <div>
            <label>Feature Codes (comma separated):</label><br>
            <input type="text" id="featureInput" style="width:400px;">
        </div>

        <br>

        <!-- OPTIONS -->
        <div>
            <label>
                <input type="checkbox" id="singlesOnly">
                Singles Only (no combinations)
            </label>
        </div>

        <br>

        <!-- BUTTONS -->
        <div>
            <!-- <button onclick="runSearch()">Single Feature Search</button> -->
            <button onclick="runComboSearch()">Analyze Combinations</button>
        </div>

        <br>

        <!-- STATUS -->
        <div id="status"></div>

        <br>

        <!-- RESULTS -->
        <div id="results"></div>

    </div>

    <div class="right">
        <label>Features List</label><br>
        <input type="text" id="featureListSearch" placeholder="Search features..." style="width:300px;margin-bottom:8px;" oninput="filterFeatureList()">
        <div id="featureList" class="feature-list"></div>
    </div>

</div>

<!-- SCRIPTS -->
<script src="decrypt.js"></script>
<script src="app.js"></script>

</body>
</html>
